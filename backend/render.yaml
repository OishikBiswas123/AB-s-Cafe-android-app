services:
  - type: web
    name: abs-cafe-backend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: abs-cafe-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: HOST
        value: 0.0.0.0
    healthCheckPath: /api/health
    autoDeploy: true

databases:
  - name: abs-cafe-db
    databaseName: abs_cafe
    user: abs_cafe_user
    plan: free
